<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card">
  <div class="col-label" style="margin-bottom:8px">Tabs</div>
  <div style="display:flex;gap:0;border-bottom:1px solid rgba(17,20,24,.15)">
    <div style="padding:8px 12px;font-size:14px;font-weight:600;color:#2d72d2;border-bottom:3px solid #2d72d2;margin-bottom:-1px">Datasets <span style="background:rgba(45,114,210,.15);color:#215db0;font-size:11px;padding:1px 5px;border-radius:8px;margin-left:4px">12</span></div>
    <div style="padding:8px 12px;font-size:14px;color:#1c2127;cursor:pointer">Pipelines</div>
    <div style="padding:8px 12px;font-size:14px;color:#1c2127;cursor:pointer">History</div>
    <div style="padding:8px 12px;font-size:14px;color:rgba(95,107,124,.6);cursor:not-allowed">Settings</div>
  </div>
  <div class="col-label" style="margin-top:16px;margin-bottom:8px">Segmented control</div>
  <div style="display:inline-flex;background:#edeff2;border-radius:4px;padding:2px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.1)">
    <button style="border:none;background:#fff;color:#1c2127;font-family:var(--bp-font-sans);font-size:13px;padding:5px 12px;border-radius:3px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 1px 2px 0 rgba(0,0,0,.1);cursor:pointer">Grid</button>
    <button style="border:none;background:transparent;color:#5f6b7c;font-family:var(--bp-font-sans);font-size:13px;padding:5px 12px;cursor:pointer">List</button>
    <button style="border:none;background:transparent;color:#5f6b7c;font-family:var(--bp-font-sans);font-size:13px;padding:5px 12px;cursor:pointer">Timeline</button>
  </div>
</div></body></html>
