<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card" style="background:#f6f7f9;padding:18px">
  <div style="display:flex;flex-direction:column;gap:8px;width:340px">
    <div style="background:#fff;border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 2px 4px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.2)">
      <img src="../assets/icons/16px/tick-circle.svg" style="width:16px;height:16px;filter:invert(40%) sepia(76%) saturate(450%) hue-rotate(95deg) brightness(85%) contrast(91%)">
      <span style="font-size:13px;color:#1c2127;flex:1">Pipeline deployed.</span>
      <button style="background:transparent;border:none;padding:2px;cursor:pointer"><img src="../assets/icons/16px/cross.svg" style="width:14px;height:14px;opacity:.5"></button>
    </div>
    <div style="background:#fff;border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 2px 4px rgba(0,0,0,.2),0 8px 24px rgba(0,0,0,.2)">
      <img src="../assets/icons/16px/warning-sign.svg" style="width:16px;height:16px;filter:invert(45%) sepia(85%) saturate(840%) hue-rotate(2deg) brightness(95%) contrast(91%)">
      <span style="font-size:13px;color:#1c2127;flex:1">Pipeline has not run in 14 days.</span>
      <button style="background:transparent;border:none;color:#215db0;font-size:13px;font-weight:600;cursor:pointer">Run</button>
    </div>
    <div style="background:#1c2127;border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 2px 4px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.4)">
      <img src="../assets/icons/16px/error.svg" style="width:16px;height:16px;filter:invert(54%) sepia(82%) saturate(740%) hue-rotate(327deg) brightness(95%) contrast(91%)">
      <span style="font-size:13px;color:#f6f7f9;flex:1">Job failed · check logs.</span>
      <button style="background:transparent;border:none;padding:2px;cursor:pointer"><img src="../assets/icons/16px/cross.svg" style="width:14px;height:14px;filter:invert(1);opacity:.5"></button>
    </div>
  </div>
</div></body></html>
