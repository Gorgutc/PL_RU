<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card">
  <div class="col-label" style="margin-bottom:8px">Icon tinting · currentColor inheritance</div>
  <div class="row" style="gap:18px;align-items:center">
    <div style="display:flex;align-items:center;gap:6px;color:#5f6b7c">
      <img src="../assets/icons/16px/info-sign.svg" style="width:16px;height:16px;opacity:.7"> default
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <img src="../assets/icons/16px/info-sign.svg" style="width:16px;height:16px;filter:invert(28%) sepia(99%) saturate(645%) hue-rotate(187deg) brightness(92%) contrast(91%)"> 
      <span style="color:#215db0">primary</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <img src="../assets/icons/16px/tick-circle.svg" style="width:16px;height:16px;filter:invert(40%) sepia(76%) saturate(450%) hue-rotate(95deg) brightness(85%) contrast(91%)">
      <span style="color:#1c6e42">success</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <img src="../assets/icons/16px/warning-sign.svg" style="width:16px;height:16px;filter:invert(45%) sepia(85%) saturate(840%) hue-rotate(2deg) brightness(95%) contrast(91%)">
      <span style="color:#935610">warning</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <img src="../assets/icons/16px/error.svg" style="width:16px;height:16px;filter:invert(20%) sepia(63%) saturate(2160%) hue-rotate(335deg) brightness(91%) contrast(86%)">
      <span style="color:#ac2f33">danger</span>
    </div>
  </div>

  <div class="col-label" style="margin-top:14px;margin-bottom:8px">Domain vocabulary — geo, charts, data, pipelines</div>
  <div class="row" style="gap:24px;align-items:center;color:#1c2127;font-size:13px">
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/satellite.svg" style="width:16px;height:16px"> satellite</div>
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/globe-network.svg" style="width:16px;height:16px"> globe-network</div>
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/data-lineage.svg" style="width:16px;height:16px"> data-lineage</div>
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/git-merge.svg" style="width:16px;height:16px"> git-merge</div>
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/heat-grid.svg" style="width:16px;height:16px"> heat-grid</div>
    <div style="display:flex;align-items:center;gap:6px"><img src="../assets/icons/16px/timeline-line-chart.svg" style="width:16px;height:16px"> timeline</div>
  </div>
</div></body></html>
