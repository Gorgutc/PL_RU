<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadow & Elevation</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   OSIRIS — Color & Type Foundation
   Egyptian Mythology × Dark Ops × Glassmorphism
   ═══════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  /* ────────────────────────────────────────────────────────────
     CORE PALETTE — Void & panel backgrounds
     ──────────────────────────────────────────────────────────── */
  --bg-void:        #04040A;   /* deepest base — full-page background    */
  --bg-primary:     #06060C;   /* primary surface                        */
  --bg-secondary:   #0C0E1A;   /* raised surface, panel solids           */
  --bg-tertiary:    #121628;   /* highest-contrast inset/cell            */
  --bg-panel:       rgba(8, 10, 20, 0.88);   /* glassmorphic panel       */
  --bg-panel-solid: #0C0E1A;

  /* ────────────────────────────────────────────────────────────
     GOLD — Eye of Horus accent (primary brand color)
     ──────────────────────────────────────────────────────────── */
  --gold-primary: #D4AF37;
  --gold-light:   #F0D060;
  --gold-dim:     #8B7325;
  --gold-glow:    rgba(212, 175, 55, 0.30);

  /* ────────────────────────────────────────────────────────────
     CYAN — Intel-stream accent (secondary brand color)
     ──────────────────────────────────────────────────────────── */
  --cyan-primary: #00E5FF;
  --cyan-dim:     #006B7A;
  --cyan-glow:    rgba(0, 229, 255, 0.15);

  /* ────────────────────────────────────────────────────────────
     ALERTS — Threat-level signal colors
     ──────────────────────────────────────────────────────────── */
  --alert-red:    #FF3D3D;     /* CRITICAL — active conflict, sanctions */
  --alert-orange: #FF9500;     /* HIGH — elevated tension               */
  --alert-green:  #00E676;     /* NOMINAL — stable, online              */
  --alert-blue:   #448AFF;     /* INFO — neutral signal                 */

  /* ────────────────────────────────────────────────────────────
     CATEGORICAL — Map-layer entity colors
     Used for plotting different intel categories on the globe.
     ──────────────────────────────────────────────────────────── */
  --layer-commercial: #00E5FF;   /* commercial aviation     */
  --layer-private:    #00E676;   /* private aviation        */
  --layer-jets:       #FF69B4;   /* private jets            */
  --layer-military:   #FF3D3D;   /* military flights        */
  --layer-maritime:   #00BCD4;   /* naval / shipping        */
  --layer-satellites: #D4AF37;   /* orbital assets          */
  --layer-cctv:       #39FF14;   /* surveillance cams       */
  --layer-news:       #FF4081;   /* broadcast feeds         */
  --layer-fires:      #FF6B00;   /* active hotspots         */
  --layer-weather:    #E040FB;   /* severe weather          */
  --layer-nuclear:    #76FF03;   /* nuclear infrastructure  */
  --layer-cyber:      #E040FB;   /* cyber/CVE              */

  /* ────────────────────────────────────────────────────────────
     BORDERS — Always derived from gold/cyan
     ──────────────────────────────────────────────────────────── */
  --border-primary:   rgba(212, 175, 55, 0.15);
  --border-secondary: rgba(212, 175, 55, 0.08);
  --border-active:    rgba(212, 175, 55, 0.40);
  --border-cyan:      rgba(0, 229, 255, 0.20);

  /* ────────────────────────────────────────────────────────────
     TEXT
     ──────────────────────────────────────────────────────────── */
  --text-primary:   #E8E6E0;   /* main body copy         */
  --text-secondary: #9B978E;   /* secondary, helper      */
  --text-muted:     #5C5A54;   /* tertiary, labels, off  */
  --text-heading:   #F5F0E0;   /* slightly warmer white  */
  --text-gold:      #D4AF37;
  --text-cyan:      #00E5FF;

  /* ────────────────────────────────────────────────────────────
     INTERACTION — Hover, scrollbar
     ──────────────────────────────────────────────────────────── */
  --hover-accent:           rgba(212, 175, 55, 0.08);
  --scrollbar-thumb:        rgba(212, 175, 55, 0.20);
  --scrollbar-thumb-hover:  rgba(212, 175, 55, 0.40);

  /* ────────────────────────────────────────────────────────────
     FONTS
     JetBrains Mono — HUD, labels, tabular data, all caps
     Inter            — body, prose, descriptions
     ──────────────────────────────────────────────────────────── */
  --font-hud:  'JetBrains Mono', 'Courier New', monospace;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  /* ────────────────────────────────────────────────────────────
     TYPE SCALE — semantic, all uppercase + tracked for HUD vibe
     ──────────────────────────────────────────────────────────── */
  --t-display:   36px;   /* hero numerics, splash logotype          */
  --t-h1:        24px;   /* section header                          */
  --t-h2:        18px;   /* panel header                            */
  --t-h3:        14px;   /* sub-section                             */
  --t-body:      13px;   /* prose                                   */
  --t-body-sm:   12px;   /* compact prose                           */
  --t-hud:       11px;   /* HUD value (data readouts)               */
  --t-hud-sm:    10px;   /* HUD label                               */
  --t-micro:      9px;   /* badge text, deep micro labels           */
  --t-mini:       8px;   /* status tags, classification stamps      */
  --t-nano:       7px;   /* tickers, edge metadata                  */

  --tracking-hud:    0.15em;
  --tracking-label:  0.20em;
  --tracking-stamp:  0.22em;  /* CLASSIFIED-style                   */

  /* ────────────────────────────────────────────────────────────
     SPACING — small steps; HUD UI is dense
     ──────────────────────────────────────────────────────────── */
  --s-1:  2px;
  --s-2:  4px;
  --s-3:  6px;
  --s-4:  8px;
  --s-5:  10px;
  --s-6:  12px;
  --s-7:  16px;
  --s-8:  20px;
  --s-9:  24px;
  --s-10: 32px;
  --panel-gap: 12px;
  --edge-pad:  20px;

  /* ────────────────────────────────────────────────────────────
     RADII — soft on the outside, sharp on micro elements
     ──────────────────────────────────────────────────────────── */
  --r-1:  4px;    /* tag, chip                  */
  --r-2:  6px;    /* badge, button              */
  --r-3:  8px;    /* small panel, input         */
  --r-4:  10px;   /* card                       */
  --r-5:  12px;   /* large panel                */
  --r-6:  14px;   /* primary glass panel        */
  --r-pill: 100px;

  /* ────────────────────────────────────────────────────────────
     SHADOWS / ELEVATION — depth + signature gold inner highlight
     ──────────────────────────────────────────────────────────── */
  --shadow-1: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-2: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-3: 0 4px 30px rgba(0, 0, 0, 0.5);
  --shadow-4: 0 8px 32px rgba(0, 0, 0, 0.6);

  /* glassmorphic panel signature: deep drop + gold inset highlight + dark inset shadow */
  --shadow-glass:
    0 4px 30px rgba(0, 0, 0, 0.5),
    0 1px 0 rgba(212, 175, 55, 0.06) inset,
    0 -1px 0 rgba(0, 0, 0, 0.3) inset;

  --shadow-glow-gold: 0 0 20px rgba(212, 175, 55, 0.12), 0 0 60px rgba(212, 175, 55, 0.06);
  --shadow-glow-cyan: 0 0 20px rgba(0, 229, 255, 0.10), 0 0 60px rgba(0, 229, 255, 0.05);
  --shadow-glow-alert: 0 0 16px rgba(255, 61, 61, 0.20);

  /* ────────────────────────────────────────────────────────────
     BLUR — backdrop filter tiers
     ──────────────────────────────────────────────────────────── */
  --blur-sm: blur(12px) saturate(1.15);
  --blur-md: blur(16px) saturate(1.20);
  --blur-lg: blur(24px) saturate(1.30);

  /* ────────────────────────────────────────────────────────────
     MOTION — easing curves used across the system
     ──────────────────────────────────────────────────────────── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);     /* enter, slide-in   */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* button, lift      */
  --ease-snap:   cubic-bezier(0.4, 0, 0.2, 1);      /* default transition*/
  --dur-1: 0.15s;
  --dur-2: 0.25s;
  --dur-3: 0.40s;
  --dur-4: 0.60s;
}

/* ═══════════════════════════════════════════════════════════════
   SEMANTIC ELEMENT STYLES
   Use these directly on <h1>, <p>, <code>, .hud-label, etc.
   ═══════════════════════════════════════════════════════════════ */

html, body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Headings — HUD style, all caps, tracked ── */
h1, .h1 {
  font-family: var(--font-hud);
  font-size: var(--t-h1);
  font-weight: 700;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-heading);
  line-height: 1.15;
}

h2, .h2 {
  font-family: var(--font-hud);
  font-size: var(--t-h2);
  font-weight: 600;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-heading);
}

h3, .h3 {
  font-family: var(--font-hud);
  font-size: var(--t-h3);
  font-weight: 600;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-primary);
}

/* ── Display — splash / hero ── */
.display {
  font-family: var(--font-hud);
  font-size: var(--t-display);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-heading);
  text-shadow: 0 0 14px rgba(212, 175, 55, 0.18);
}

/* ── Body — Inter, sentence case ── */
p, .body {
  font-family: var(--font-body);
  font-size: var(--t-body);
  line-height: 1.6;
  color: var(--text-secondary);
}

.body-sm {
  font-family: var(--font-body);
  font-size: var(--t-body-sm);
  line-height: 1.55;
  color: var(--text-secondary);
}

/* ── HUD labels & values — JetBrains Mono ── */
.hud-label {
  font-family: var(--font-hud);
  font-size: var(--t-mini);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-muted);
}

.hud-value {
  font-family: var(--font-hud);
  font-size: var(--t-hud);
  font-weight: 600;
  color: var(--gold-primary);
  font-variant-numeric: tabular-nums;
}

.hud-value--cyan { color: var(--cyan-primary); }
.hud-value--alert { color: var(--alert-red); }

/* ── Classification stamps ── */
.classified {
  font-family: var(--font-hud);
  font-size: var(--t-mini);
  font-weight: 700;
  letter-spacing: var(--tracking-stamp);
  text-transform: uppercase;
  color: var(--gold-primary);
  padding: 3px 8px;
  border: 1px solid var(--border-active);
  border-radius: var(--r-1);
  background: rgba(212, 175, 55, 0.05);
}

/* ── Inline code, command strings ── */
code, .code {
  font-family: var(--font-hud);
  font-size: var(--t-body-sm);
  color: var(--cyan-primary);
  background: rgba(0, 229, 255, 0.06);
  padding: 1px 6px;
  border-radius: var(--r-1);
  border: 1px solid var(--border-cyan);
}

/* ── Risk text colors ── */
.risk-critical { color: var(--alert-red);    text-shadow: 0 0 8px rgba(255, 61, 61, 0.5); }
.risk-high     { color: var(--alert-orange); text-shadow: 0 0 8px rgba(255, 149, 0, 0.3); }
.risk-medium   { color: var(--gold-primary); }
.risk-low      { color: var(--alert-green); }

/* ── Scrollbar ── */
.styled-scrollbar::-webkit-scrollbar { width: 3px; height: 3px; }
.styled-scrollbar::-webkit-scrollbar-track { background: transparent; }
.styled-scrollbar::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
.styled-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
.styled-scrollbar { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }

</style>
<style>
  html, body { margin: 0; }
  body {
    background: var(--bg-void);
    padding: 30px 24px;
    font-family: var(--font-body);
    display: flex; align-items: center; justify-content: space-around;
    gap: 20px;
  }
  .tile {
    width: 130px; height: 90px;
    border-radius: 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border-secondary);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 8px 10px;
  }
  .tile__name { font-family: var(--font-hud); font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-heading); }
  .tile__desc { font-family: var(--font-hud); font-size: 7px; color: var(--text-muted); letter-spacing: 0.1em; }
  .t1 { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .t2 { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .t3 { box-shadow: 0 4px 30px rgba(0,0,0,0.5), 0 1px 0 rgba(212,175,55,0.06) inset; border-color: var(--border-primary); }
  .glow-gold { box-shadow: 0 0 20px rgba(212,175,55,0.18), 0 0 60px rgba(212,175,55,0.08), 0 4px 30px rgba(0,0,0,0.5); border-color: var(--border-active); }
  .glow-cyan { box-shadow: 0 0 20px rgba(0,229,255,0.18), 0 0 60px rgba(0,229,255,0.08); border-color: var(--border-cyan); }
</style>
</head>
<body>
  <div class="tile t1">
    <div class="tile__name">Shadow 1</div>
    <div class="tile__desc">Subtle · cells</div>
  </div>
  <div class="tile t2">
    <div class="tile__name">Shadow 2</div>
    <div class="tile__desc">Card raised</div>
  </div>
  <div class="tile t3">
    <div class="tile__name">Glass</div>
    <div class="tile__desc">Panel · inset gold</div>
  </div>
  <div class="tile glow-gold">
    <div class="tile__name" style="color:var(--gold-primary)">Glow · Gold</div>
    <div class="tile__desc">Brand emphasis</div>
  </div>
  <div class="tile glow-cyan">
    <div class="tile__name" style="color:var(--cyan-primary)">Glow · Cyan</div>
    <div class="tile__desc">Intel stream</div>
  </div>
</body>
</html>
