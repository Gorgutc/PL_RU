<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OSIRIS · Global Intelligence Platform</title>
<meta name="viewport" content="width=1440">
<link rel="icon" type="image/png" href="../../assets/osiris-icon.png">

<style>
/* ═══════════════════════════════════════════════════════════════
   OSIRIS — Color & Type Foundation
   Egyptian Mythology × Dark Ops × Glassmorphism
   ═══════════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  /* ────────────────────────────────────────────────────────────
     CORE PALETTE — Void & panel backgrounds
     ──────────────────────────────────────────────────────────── */
  --bg-void:        #04040A;   /* deepest base — full-page background    */
  --bg-primary:     #06060C;   /* primary surface                        */
  --bg-secondary:   #0C0E1A;   /* raised surface, panel solids           */
  --bg-tertiary:    #121628;   /* highest-contrast inset/cell            */
  --bg-panel:       rgba(8, 10, 20, 0.88);   /* glassmorphic panel       */
  --bg-panel-solid: #0C0E1A;

  /* ────────────────────────────────────────────────────────────
     GOLD — Eye of Horus accent (primary brand color)
     ──────────────────────────────────────────────────────────── */
  --gold-primary: #D4AF37;
  --gold-light:   #F0D060;
  --gold-dim:     #8B7325;
  --gold-glow:    rgba(212, 175, 55, 0.30);

  /* ────────────────────────────────────────────────────────────
     CYAN — Intel-stream accent (secondary brand color)
     ──────────────────────────────────────────────────────────── */
  --cyan-primary: #00E5FF;
  --cyan-dim:     #006B7A;
  --cyan-glow:    rgba(0, 229, 255, 0.15);

  /* ────────────────────────────────────────────────────────────
     ALERTS — Threat-level signal colors
     ──────────────────────────────────────────────────────────── */
  --alert-red:    #FF3D3D;     /* CRITICAL — active conflict, sanctions */
  --alert-orange: #FF9500;     /* HIGH — elevated tension               */
  --alert-green:  #00E676;     /* NOMINAL — stable, online              */
  --alert-blue:   #448AFF;     /* INFO — neutral signal                 */

  /* ────────────────────────────────────────────────────────────
     CATEGORICAL — Map-layer entity colors
     Used for plotting different intel categories on the globe.
     ──────────────────────────────────────────────────────────── */
  --layer-commercial: #00E5FF;   /* commercial aviation     */
  --layer-private:    #00E676;   /* private aviation        */
  --layer-jets:       #FF69B4;   /* private jets            */
  --layer-military:   #FF3D3D;   /* military flights        */
  --layer-maritime:   #00BCD4;   /* naval / shipping        */
  --layer-satellites: #D4AF37;   /* orbital assets          */
  --layer-cctv:       #39FF14;   /* surveillance cams       */
  --layer-news:       #FF4081;   /* broadcast feeds         */
  --layer-fires:      #FF6B00;   /* active hotspots         */
  --layer-weather:    #E040FB;   /* severe weather          */
  --layer-nuclear:    #76FF03;   /* nuclear infrastructure  */
  --layer-cyber:      #E040FB;   /* cyber/CVE              */

  /* ────────────────────────────────────────────────────────────
     BORDERS — Always derived from gold/cyan
     ──────────────────────────────────────────────────────────── */
  --border-primary:   rgba(212, 175, 55, 0.15);
  --border-secondary: rgba(212, 175, 55, 0.08);
  --border-active:    rgba(212, 175, 55, 0.40);
  --border-cyan:      rgba(0, 229, 255, 0.20);

  /* ────────────────────────────────────────────────────────────
     TEXT
     ──────────────────────────────────────────────────────────── */
  --text-primary:   #E8E6E0;   /* main body copy         */
  --text-secondary: #9B978E;   /* secondary, helper      */
  --text-muted:     #5C5A54;   /* tertiary, labels, off  */
  --text-heading:   #F5F0E0;   /* slightly warmer white  */
  --text-gold:      #D4AF37;
  --text-cyan:      #00E5FF;

  /* ────────────────────────────────────────────────────────────
     INTERACTION — Hover, scrollbar
     ──────────────────────────────────────────────────────────── */
  --hover-accent:           rgba(212, 175, 55, 0.08);
  --scrollbar-thumb:        rgba(212, 175, 55, 0.20);
  --scrollbar-thumb-hover:  rgba(212, 175, 55, 0.40);

  /* ────────────────────────────────────────────────────────────
     FONTS
     JetBrains Mono — HUD, labels, tabular data, all caps
     Inter            — body, prose, descriptions
     ──────────────────────────────────────────────────────────── */
  --font-hud:  'JetBrains Mono', 'Courier New', monospace;
  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;

  /* ────────────────────────────────────────────────────────────
     TYPE SCALE — semantic, all uppercase + tracked for HUD vibe
     ──────────────────────────────────────────────────────────── */
  --t-display:   36px;   /* hero numerics, splash logotype          */
  --t-h1:        24px;   /* section header                          */
  --t-h2:        18px;   /* panel header                            */
  --t-h3:        14px;   /* sub-section                             */
  --t-body:      13px;   /* prose                                   */
  --t-body-sm:   12px;   /* compact prose                           */
  --t-hud:       11px;   /* HUD value (data readouts)               */
  --t-hud-sm:    10px;   /* HUD label                               */
  --t-micro:      9px;   /* badge text, deep micro labels           */
  --t-mini:       8px;   /* status tags, classification stamps      */
  --t-nano:       7px;   /* tickers, edge metadata                  */

  --tracking-hud:    0.15em;
  --tracking-label:  0.20em;
  --tracking-stamp:  0.22em;  /* CLASSIFIED-style                   */

  /* ────────────────────────────────────────────────────────────
     SPACING — small steps; HUD UI is dense
     ──────────────────────────────────────────────────────────── */
  --s-1:  2px;
  --s-2:  4px;
  --s-3:  6px;
  --s-4:  8px;
  --s-5:  10px;
  --s-6:  12px;
  --s-7:  16px;
  --s-8:  20px;
  --s-9:  24px;
  --s-10: 32px;
  --panel-gap: 12px;
  --edge-pad:  20px;

  /* ────────────────────────────────────────────────────────────
     RADII — soft on the outside, sharp on micro elements
     ──────────────────────────────────────────────────────────── */
  --r-1:  4px;    /* tag, chip                  */
  --r-2:  6px;    /* badge, button              */
  --r-3:  8px;    /* small panel, input         */
  --r-4:  10px;   /* card                       */
  --r-5:  12px;   /* large panel                */
  --r-6:  14px;   /* primary glass panel        */
  --r-pill: 100px;

  /* ────────────────────────────────────────────────────────────
     SHADOWS / ELEVATION — depth + signature gold inner highlight
     ──────────────────────────────────────────────────────────── */
  --shadow-1: 0 2px 8px rgba(0, 0, 0, 0.3);
  --shadow-2: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-3: 0 4px 30px rgba(0, 0, 0, 0.5);
  --shadow-4: 0 8px 32px rgba(0, 0, 0, 0.6);

  /* glassmorphic panel signature: deep drop + gold inset highlight + dark inset shadow */
  --shadow-glass:
    0 4px 30px rgba(0, 0, 0, 0.5),
    0 1px 0 rgba(212, 175, 55, 0.06) inset,
    0 -1px 0 rgba(0, 0, 0, 0.3) inset;

  --shadow-glow-gold: 0 0 20px rgba(212, 175, 55, 0.12), 0 0 60px rgba(212, 175, 55, 0.06);
  --shadow-glow-cyan: 0 0 20px rgba(0, 229, 255, 0.10), 0 0 60px rgba(0, 229, 255, 0.05);
  --shadow-glow-alert: 0 0 16px rgba(255, 61, 61, 0.20);

  /* ────────────────────────────────────────────────────────────
     BLUR — backdrop filter tiers
     ──────────────────────────────────────────────────────────── */
  --blur-sm: blur(12px) saturate(1.15);
  --blur-md: blur(16px) saturate(1.20);
  --blur-lg: blur(24px) saturate(1.30);

  /* ────────────────────────────────────────────────────────────
     MOTION — easing curves used across the system
     ──────────────────────────────────────────────────────────── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);     /* enter, slide-in   */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* button, lift      */
  --ease-snap:   cubic-bezier(0.4, 0, 0.2, 1);      /* default transition*/
  --dur-1: 0.15s;
  --dur-2: 0.25s;
  --dur-3: 0.40s;
  --dur-4: 0.60s;
}

/* ═══════════════════════════════════════════════════════════════
   SEMANTIC ELEMENT STYLES
   Use these directly on <h1>, <p>, <code>, .hud-label, etc.
   ═══════════════════════════════════════════════════════════════ */

html, body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── Headings — HUD style, all caps, tracked ── */
h1, .h1 {
  font-family: var(--font-hud);
  font-size: var(--t-h1);
  font-weight: 700;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-heading);
  line-height: 1.15;
}

h2, .h2 {
  font-family: var(--font-hud);
  font-size: var(--t-h2);
  font-weight: 600;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-heading);
}

h3, .h3 {
  font-family: var(--font-hud);
  font-size: var(--t-h3);
  font-weight: 600;
  letter-spacing: var(--tracking-hud);
  text-transform: uppercase;
  color: var(--text-primary);
}

/* ── Display — splash / hero ── */
.display {
  font-family: var(--font-hud);
  font-size: var(--t-display);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-heading);
  text-shadow: 0 0 14px rgba(212, 175, 55, 0.18);
}

/* ── Body — Inter, sentence case ── */
p, .body {
  font-family: var(--font-body);
  font-size: var(--t-body);
  line-height: 1.6;
  color: var(--text-secondary);
}

.body-sm {
  font-family: var(--font-body);
  font-size: var(--t-body-sm);
  line-height: 1.55;
  color: var(--text-secondary);
}

/* ── HUD labels & values — JetBrains Mono ── */
.hud-label {
  font-family: var(--font-hud);
  font-size: var(--t-mini);
  letter-spacing: var(--tracking-label);
  text-transform: uppercase;
  color: var(--text-muted);
}

.hud-value {
  font-family: var(--font-hud);
  font-size: var(--t-hud);
  font-weight: 600;
  color: var(--gold-primary);
  font-variant-numeric: tabular-nums;
}

.hud-value--cyan { color: var(--cyan-primary); }
.hud-value--alert { color: var(--alert-red); }

/* ── Classification stamps ── */
.classified {
  font-family: var(--font-hud);
  font-size: var(--t-mini);
  font-weight: 700;
  letter-spacing: var(--tracking-stamp);
  text-transform: uppercase;
  color: var(--gold-primary);
  padding: 3px 8px;
  border: 1px solid var(--border-active);
  border-radius: var(--r-1);
  background: rgba(212, 175, 55, 0.05);
}

/* ── Inline code, command strings ── */
code, .code {
  font-family: var(--font-hud);
  font-size: var(--t-body-sm);
  color: var(--cyan-primary);
  background: rgba(0, 229, 255, 0.06);
  padding: 1px 6px;
  border-radius: var(--r-1);
  border: 1px solid var(--border-cyan);
}

/* ── Risk text colors ── */
.risk-critical { color: var(--alert-red);    text-shadow: 0 0 8px rgba(255, 61, 61, 0.5); }
.risk-high     { color: var(--alert-orange); text-shadow: 0 0 8px rgba(255, 149, 0, 0.3); }
.risk-medium   { color: var(--gold-primary); }
.risk-low      { color: var(--alert-green); }

/* ── Scrollbar ── */
.styled-scrollbar::-webkit-scrollbar { width: 3px; height: 3px; }
.styled-scrollbar::-webkit-scrollbar-track { background: transparent; }
.styled-scrollbar::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
.styled-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
.styled-scrollbar { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }

</style>
<style>
/* ═══════════════════════════════════════════════════════════════
   OSIRIS — Component Styles
   "Gotham Command System" — Palantir-class HUD primitives
   Depends on colors_and_type.css for tokens.
   ═══════════════════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════════════════
   GLASS PANELS — Primary container vocabulary
   ═══════════════════════════════════════════════════════════════ */
.glass-panel {
  background: var(--bg-panel);
  backdrop-filter: var(--blur-lg);
  -webkit-backdrop-filter: var(--blur-lg);
  border: 1px solid var(--border-primary);
  border-radius: var(--r-6);
  box-shadow: var(--shadow-glass);
  transition: border-color var(--dur-2) var(--ease-snap), box-shadow var(--dur-2) var(--ease-snap);
}

.glass-panel:hover {
  border-color: rgba(212, 175, 55, 0.22);
}

.glass-panel-sm {
  background: var(--bg-panel);
  backdrop-filter: var(--blur-md);
  -webkit-backdrop-filter: var(--blur-md);
  border: 1px solid var(--border-secondary);
  border-radius: var(--r-4);
}

.osiris-glow { box-shadow: var(--shadow-glow-gold), var(--shadow-3); }
.osiris-glow-cyan { box-shadow: var(--shadow-glow-cyan); }

/* ═══════════════════════════════════════════════════════════════
   GOTHAM CARD — Left-accent border, hover lift
   ═══════════════════════════════════════════════════════════════ */
.gotham-card {
  position: relative;
  padding: 18px 22px;
  background: var(--bg-panel);
  backdrop-filter: var(--blur-md);
  -webkit-backdrop-filter: var(--blur-md);
  border: 1px solid var(--border-secondary);
  border-left: 3px solid var(--gold-dim);
  border-radius: var(--r-4);
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.35), 0 1px 0 rgba(212, 175, 55, 0.04) inset;
  transition: transform var(--dur-3) var(--ease-spring), box-shadow var(--dur-3) var(--ease-snap), border-color var(--dur-2) var(--ease-snap);
}

.gotham-card:hover {
  transform: translateY(-2px);
  border-left-color: var(--gold-primary);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 24px rgba(212, 175, 55, 0.06), 0 1px 0 rgba(212, 175, 55, 0.08) inset;
}

.gotham-card--cyan { border-left-color: var(--cyan-dim); }
.gotham-card--cyan:hover { border-left-color: var(--cyan-primary); box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 24px rgba(0,229,255,0.05); }
.gotham-card--alert { border-left-color: rgba(255,61,61,0.4); }
.gotham-card--alert:hover { border-left-color: var(--alert-red); box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(255,61,61,0.06); }

.gotham-card__title {
  font-family: var(--font-hud);
  font-size: var(--t-hud-sm);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-heading);
}

/* ═══════════════════════════════════════════════════════════════
   GOTHAM TAGS — Pill badges, threat levels, classification
   ═══════════════════════════════════════════════════════════════ */
.gotham-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  font-family: var(--font-hud);
  font-size: var(--t-mini);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--border-secondary);
  border-radius: var(--r-pill);
  white-space: nowrap;
}

.gotham-tag--critical {
  color: var(--alert-red);
  background: rgba(255, 61, 61, 0.10);
  border-color: rgba(255, 61, 61, 0.25);
  box-shadow: 0 0 8px rgba(255, 61, 61, 0.10);
}
.gotham-tag--high {
  color: var(--alert-orange);
  background: rgba(255, 149, 0, 0.08);
  border-color: rgba(255, 149, 0, 0.20);
}
.gotham-tag--medium {
  color: var(--gold-primary);
  background: rgba(212, 175, 55, 0.08);
  border-color: rgba(212, 175, 55, 0.18);
}
.gotham-tag--low {
  color: var(--alert-green);
  background: rgba(0, 230, 118, 0.07);
  border-color: rgba(0, 230, 118, 0.15);
}
.gotham-tag--info {
  color: var(--cyan-primary);
  background: rgba(0, 229, 255, 0.06);
  border-color: var(--border-cyan);
}
.gotham-tag--classified {
  color: var(--gold-primary);
  background: rgba(212, 175, 55, 0.06);
  border-color: rgba(212, 175, 55, 0.25);
  letter-spacing: var(--tracking-stamp);
}

/* ═══════════════════════════════════════════════════════════════
   THREAT BADGES — Pulsing alert-level indicators
   ═══════════════════════════════════════════════════════════════ */
@keyframes threat-pulse-critical {
  0%, 100% { box-shadow: 0 0 6px rgba(255,61,61,0.4), inset 0 0 6px rgba(255,61,61,0.1); }
  50%      { box-shadow: 0 0 16px rgba(255,61,61,0.6), inset 0 0 10px rgba(255,61,61,0.15); }
}
@keyframes threat-pulse-high {
  0%, 100% { box-shadow: 0 0 6px rgba(255,149,0,0.3); }
  50%      { box-shadow: 0 0 14px rgba(255,149,0,0.5); }
}
@keyframes threat-pulse-elevated {
  0%, 100% { box-shadow: 0 0 4px rgba(212,175,55,0.25); }
  50%      { box-shadow: 0 0 10px rgba(212,175,55,0.4); }
}

.threat-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-hud);
  font-size: var(--t-micro);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: var(--r-2);
  border: 1px solid;
}
.threat-badge--critical { color: var(--alert-red);    background: rgba(255,61,61,0.10);  border-color: rgba(255,61,61,0.30); animation: threat-pulse-critical 1.8s ease-in-out infinite; }
.threat-badge--high     { color: var(--alert-orange); background: rgba(255,149,0,0.10);  border-color: rgba(255,149,0,0.25); animation: threat-pulse-high 2.2s ease-in-out infinite; }
.threat-badge--elevated { color: var(--gold-primary); background: rgba(212,175,55,0.08); border-color: rgba(212,175,55,0.20); animation: threat-pulse-elevated 3s ease-in-out infinite; }
.threat-badge--nominal  { color: var(--alert-green);  background: rgba(0,230,118,0.08);  border-color: rgba(0,230,118,0.20); box-shadow: 0 0 4px rgba(0,230,118,0.15); }

/* ═══════════════════════════════════════════════════════════════
   BUTTONS — Tactical / pressable
   ═══════════════════════════════════════════════════════════════ */
.btn-tactical {
  position: relative;
  overflow: hidden;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-hud);
  font-size: var(--t-hud);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-primary);
  background: rgba(212, 175, 55, 0.08);
  border: 1px solid var(--border-primary);
  border-radius: var(--r-3);
  padding: 9px 18px;
  cursor: pointer;
  transition: transform var(--dur-1) var(--ease-spring), box-shadow var(--dur-2) var(--ease-snap), border-color var(--dur-2) var(--ease-snap), background var(--dur-2) var(--ease-snap);
}
.btn-tactical:hover {
  background: rgba(212, 175, 55, 0.14);
  border-color: var(--border-active);
  box-shadow: 0 0 20px rgba(212, 175, 55, 0.12);
}
.btn-tactical:active { transform: scale(0.97); }

.btn-tactical--cyan {
  background: rgba(0, 229, 255, 0.08);
  border-color: var(--border-cyan);
  color: var(--cyan-primary);
}
.btn-tactical--cyan:hover { background: rgba(0,229,255,0.14); border-color: rgba(0,229,255,0.4); box-shadow: 0 0 20px rgba(0,229,255,0.10); }

.btn-tactical--ghost { background: transparent; border-color: var(--border-secondary); color: var(--text-secondary); }
.btn-tactical--ghost:hover { border-color: var(--border-primary); color: var(--text-primary); background: var(--hover-accent); }

.btn-tactical--alert { background: rgba(255,61,61,0.10); border-color: rgba(255,61,61,0.30); color: var(--alert-red); }
.btn-tactical--alert:hover { background: rgba(255,61,61,0.16); border-color: rgba(255,61,61,0.5); box-shadow: 0 0 20px rgba(255,61,61,0.18); }

.btn-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: var(--r-2);
  border: 1px solid var(--border-secondary);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: color var(--dur-1), border-color var(--dur-1), background var(--dur-1), box-shadow var(--dur-2);
}
.btn-icon:hover {
  color: var(--gold-primary);
  border-color: var(--border-primary);
  background: rgba(212, 175, 55, 0.06);
  box-shadow: 0 0 12px rgba(212, 175, 55, 0.08);
}

/* ═══════════════════════════════════════════════════════════════
   LAYER TOGGLE — Custom switch
   ═══════════════════════════════════════════════════════════════ */
.layer-toggle {
  position: relative;
  width: 28px;
  height: 14px;
  border-radius: 7px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  cursor: pointer;
  transition: all var(--dur-2) var(--ease-snap);
  flex-shrink: 0;
}
.layer-toggle.active {
  background: rgba(212, 175, 55, 0.25);
  border-color: var(--gold-primary);
}
.layer-toggle::after {
  content: '';
  position: absolute;
  top: 1px;
  left: 1px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all var(--dur-2) var(--ease-snap);
}
.layer-toggle.active::after {
  left: 15px;

  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-secondary);
  border-radius: 6px;
}
.markets-panel__commodity-name {
  font-family: var(--font-hud);
  font-size: 8px;
  letter-spacing: 0.18em;
  color: var(--text-muted);
}
.markets-panel__commodity-val {
  font-family: var(--font-hud);
  font-size: 16px;
  font-weight: 700;
  color: var(--text-heading);
  font-variant-numeric: tabular-nums;
  margin: 2px 0;
}
.markets-panel__commodity-delta {
  font-family: var(--font-hud);
  font-size: 9px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.05em;
}
.markets-panel__commodity-delta.up { color: var(--alert-green); }
.markets-panel__commodity-delta.down { color: var(--alert-red); }

/* ─── StatusTicker ─────────────────────────────────────────── */
.status-ticker {
  display: flex; align-items: center;
  background: rgba(8,10,20,0.92);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-secondary);
  font-family: var(--font-hud);
  font-size: 9px;
  letter-spacing: 0.08em;
  overflow: hidden;
  z-index: 200;
}
.status-ticker__static {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px; height: 100%;
  border-right: 1px solid var(--border-secondary);
  background: rgba(12,14,26,0.85);
}
.status-ticker__rolling {
  flex: 1; overflow: hidden;
  position: relative;
  mask-image: linear-gradient(90deg, transparent, black 4%, black 96%, transparent);
}
.status-ticker__inner {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  white-space: nowrap;
  padding-left: 14px;
}
.ticker__item { display: inline-flex; align-items: center; gap: 4px; color: var(--text-secondary); }
.ticker__dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(155,151,142,0.3); }
.ticker__dot.open { background: var(--alert-green); box-shadow: 0 0 4px rgba(0,230,118,0.5); }
.ticker__sep { color: var(--border-primary); padding: 0 4px; }
.status-ticker__right {
  display: flex; align-items: center; gap: 6px;
  padding: 0 12px;
  border-left: 1px solid var(--border-secondary);
  background: rgba(12,14,26,0.85);
  color: var(--text-muted);
  font-size: 8px; letter-spacing: 0.16em;
}

/* ─── MapSurface ───────────────────────────────────────────── */
.map-surface {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 38% 45%, rgba(212,175,55,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 65% 60%, rgba(0,229,255,0.05) 0%, transparent 50%),
    var(--bg-void);
  overflow: hidden;
}
.map-surface__bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.map-surface__entities {
  position: absolute; inset: 0;
  pointer-events: none;
}
.entity {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  background: currentColor;
}
.entity--flights, .entity--military, .entity--jets {
  width: 5px; height: 5px;
  border-radius: 1px;
}
.entity--satellites {
  width: 3px; height: 3px;
  animation: osiris-pulse 4s ease-in-out infinite;
}
.entity--earthquakes {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,149,0,0.2);
  border: 1px solid currentColor;
}
.entity--fires {
  width: 6px; height: 6px;
  background: radial-gradient(circle, currentColor 0%, transparent 70%);
}
.entity--cctv {
  width: 2px; height: 2px;
  opacity: 0.7;
}
.entity--incident {
  width: 14px; height: 14px;
  border: 1.5px solid currentColor;
  background: rgba(255,61,61,0.1);
  border-radius: 2px;
  transform: translate(-50%, -50%) rotate(45deg);
  animation: osiris-pulse 1.6s ease-in-out infinite;
}

.map-surface__coords {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(8,10,20,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-secondary);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: var(--font-hud); font-size: 9px;
  display: flex; flex-direction: column; gap: 2px;
  letter-spacing: 0.06em;
}
.map-surface__coords > div { display: flex; gap: 6px; justify-content: space-between; }

.map-surface__scale {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(8,10,20,0.7);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border-secondary);
  border-radius: 6px;
  padding: 6px 12px;
  font-family: var(--font-hud);
  display: flex; align-items: center; gap: 8px;
}
.map-surface__scale-bar {
  width: 100px;
  height: 4px;
  background: linear-gradient(90deg, var(--gold-primary) 0%, var(--gold-primary) 50%, transparent 50%, transparent 100%);
  background-size: 20px 100%;
  border-top: 1px solid var(--gold-primary);
  border-bottom: 1px solid var(--gold-primary);
}

/* ─── Splash ───────────────────────────────────────────────── */
.splash {
  position: fixed; inset: 0;
  background: var(--bg-void);
  background-image: radial-gradient(ellipse at center, rgba(212,175,55,0.05), transparent 60%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 24px;
  z-index: 9999;
  overflow: hidden;
}
.splash__scanline {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-primary) 30%, var(--cyan-primary) 70%, transparent);
  box-shadow: 0 0 20px var(--gold-primary);
  animation: splash-scanline 2.5s ease-in-out infinite;
}
@keyframes splash-scanline {
  0% { transform: translateY(0); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(100vh); opacity: 0; }
}

.splash__rings {
  position: relative;
  width: 160px; height: 160px;
  display: flex; align-items: center; justify-content: center;
}
.splash__icon {
  width: 70px; height: 70px;
  z-index: 2;
  filter: drop-shadow(0 0 12px rgba(212,175,55,0.6));
  border-radius: 12px;
}
.splash-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid transparent;
}
.splash-ring--outer {
  width: 160px; height: 160px;
  border-color: rgba(212,175,55,0.25);
  border-top-color: var(--gold-primary);
  animation: spin 3s linear infinite;
}
.splash-ring--mid {
  width: 128px; height: 128px;
  border-color: rgba(212,175,55,0.12);
  border-right-color: rgba(212,175,55,0.6);
  animation: spin-rev 5s linear infinite;
}
.splash-ring--inner {
  width: 96px; height: 96px;
  border-color: rgba(0,229,255,0.1);
  border-bottom-color: rgba(0,229,255,0.5);
  animation: spin 4s linear infinite;
}
.splash-ring--core { display: none; }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
@keyframes spin-rev { from { transform: rotate(0); } to { transform: rotate(-360deg); } }

.splash__brand { text-align: center; }
.splash__name {
  font-family: var(--font-hud);
  font-size: 40px;
  font-weight: 700;
  letter-spacing: 0.20em;
  color: var(--text-heading);
  text-shadow: 0 0 14px rgba(212,175,55,0.25);
}
.splash__sub {
  font-family: var(--font-hud);
  font-size: 9px;
  letter-spacing: 0.32em;
  color: var(--gold-primary);
  margin-top: 6px;
}
.splash__progress {
  width: 320px;
  display: flex; flex-direction: column; gap: 6px;
}
.splash__phase {
  display: flex; justify-content: space-between;
  font-family: var(--font-hud);
  font-size: 9px;
  letter-spacing: 0.18em;
  color: var(--text-muted);
}
.splash__bottom {
  position: absolute; bottom: 28px;
  display: flex; gap: 14px; align-items: center;
}

/* ─── Tooltip popovers used on map hover (sample) ───────────── */
.map-popover {
  position: absolute;
  z-index: 250;
  padding: 8px 12px;
  background: rgba(12, 14, 26, 0.92);
  backdrop-filter: blur(20px) saturate(1.2);
  border: 1px solid var(--border-primary);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 12px rgba(212,175,55,0.06);
  font-family: var(--font-hud);
  font-size: 10px;
  color: var(--text-primary);
  pointer-events: none;
}

/**

 */
const CommandBar = ({ onSearchClick, projection, onToggleProjection }) => {
  const [time, setTime] = React.useState(getZulu());

  React.useEffect(() => {
    const iv = setInterval(() => setTime(getZulu()), 1000);
    return () => clearInterval(iv);
  }, []);

  return (
    <div className="command-bar">
      {/* Brand */}
      <div className="command-bar__section">
        <img src="../../assets/osiris-icon.png" className="command-bar__logo" alt="" />
        <div className="command-bar__brand">

          <span className="command-bar__name">OSIRIS</span>
          <span className="command-bar__sub">GLOBAL INTELLIGENCE</span>
        </div>
        <span className="classified">⬢ CLASSIFIED</span>

      {/* Center search */}
      <div className="command-bar__center">
        <button className="command-bar__search" onClick={onSearchClick}>
          <Icon name="search" size={12} />
          <span>CMD: LOCATE — COORDINATES, CALLSIGN, OR NAME…</span>
          <kbd className="command-bar__kbd">⌘L</kbd>
        </button>
      </div>

      {/* Right cluster */}
      <div className="command-bar__section">
        <div className="command-bar__stat">
          <span className="hud-label">ZULU</span>
          <span className="command-bar__zulu">{time}</span>
        </div>
        <div className="command-bar__stat">
          <span className="hud-label">THROUGHPUT</span>
          <span className="command-bar__throughput">3.4 MB/s</span>
        </div>
        <div className="command-bar__divider" />
        <button className={`command-bar__projection ${projection === 'globe' ? 'active' : ''}`} onClick={onToggleProjection}>
          <Icon name="globe" size={14} />
          <span>{projection.toUpperCase()}</span>
        </button>
        <button className="btn-icon" title="Share"><Icon name="share" size={14} /></button>
        <button className="btn-icon" title="Settings"><Icon name="settings" size={14} /></button>
      </div>
    </div>
  );
};

function getZulu() {
  const d = new Date();
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')}Z`;
}

window.CommandBar = CommandBar;

function getRiskLevel(score) {
  if (score >= 8) return { label: 'CRITICAL', cls: 'critical' };
  if (score >= 6) return { label: 'HIGH',     cls: 'high' };
  if (score >= 4) return { label: 'ELEVATED', cls: 'elevated' };
  return                  { label: 'LOW',      cls: 'low' };
}
function timeAgo(mins) {
  if (mins < 60) return `${mins}m AGO`;
  return `${Math.floor(mins/60)}h ${mins%60}m AGO`;
}

      'BOOTING KERNEL',

      p += 5;
      setProgress(Math.min(p, 100));

        clearInterval(iv);
        setTimeout(onDismiss, 300);

    return () => clearInterval(iv);
  }, []);

      {/* scan sweep */}
      <div className="scan-line scan-line--gold" style={{ animationDuration: '6s', opacity: 0.6 }} />

      {/* vignette */}
      <div className="vignette" style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }} />

      {/* coords HUD bottom-left */}
      <div className="map-surface__coords">
        <div><span className="hud-label">LAT</span> <span className="hud-value">48.8566° N</span></div>
        <div><span className="hud-label">LON</span> <span className="hud-value">002.3522° E</span></div>
        <div><span className="hud-label">ZOOM</span> <span className="hud-value">2.4</span></div>
      </div>

      {/* scale bar top-right */}
      <div className="map-surface__scale">
        <div className="hud-label">SCALE</div>
        <div className="map-surface__scale-bar" />
        <div className="hud-value">~ 500 km</div>
      </div>
    </div>
  );
};

window.MapSurface = MapSurface;

/* eslint-disable */
/**
 * OSIRIS · App — the dashboard root
 * Composes CommandBar + MapSurface + LayerPanel + IntelFeed + MarketsPanel
 * + StatusTicker. Renders Splash on first paint.
 */
const { useState, useEffect } = React;

const DEFAULT_LAYERS = {
  flights: true, private: false, jets: false, military: true,
  maritime: false, satellites: true,
  cctv: false, livenews: false, sigint: true,
  earthquakes: true, fires: false, weather: false,
  nuclear: false, incidents: true, jamming: false,
};

const App = () => {
  const [showSplash, setShowSplash] = useState(true);
  const [activeLayers, setActiveLayers] = useState(DEFAULT_LAYERS);
  const [expandedGroups, setExpandedGroups] = useState({
    AVIATION: true, 'MARITIME & SPACE': true, SURVEILLANCE: false,
    'NATURAL HAZARDS': true, 'THREATS & INFRA': true,
  });
  const [projection, setProjection] = useState('globe');

  const toggleLayer = (key) => setActiveLayers(p => ({ ...p, [key]: !p[key] }));
  const toggleGroup = (group) => {
    const allActive = group.layers.every(l => activeLayers[l.key]);
    setActiveLayers(p => {
      const next = { ...p };
      group.layers.forEach(l => { next[l.key] = !allActive; });
      return next;
    });
  };
  const expandGroup = (label) => setExpandedGroups(p => ({ ...p, [label]: !p[label] }));

  return (
    <div className="app">
      {showSplash && <Splash onDismiss={() => setShowSplash(false)} />}

      <CommandBar
        projection={projection}
        onToggleProjection={() => setProjection(p => p === 'globe' ? 'mercator' : 'globe')}
        onSearchClick={() => {}}
      />

      <div className="workspace">
        <MapSurface activeLayers={activeLayers} />

        <div className="workspace__left">
          <LayerPanel
            activeLayers={activeLayers}
            onToggle={toggleLayer}
            onToggleGroup={toggleGroup}
            expandedGroups={expandedGroups}
            onExpand={expandGroup}
          />
        </div>

        <div className="workspace__right">
          <IntelFeed />
        </div>

        <div className="workspace__bottom-right">
          <MarketsPanel />
        </div>
      </div>

      <StatusTicker />
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
