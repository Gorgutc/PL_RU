name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ship:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # pnpm version is taken from package.json "packageManager". Do not also
      # set `version:` here; pnpm/action-setup errors on double specification.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lockfile-pinned browser: the runner's system Chrome changes with the
      # image (148 -> 149 broke font metrics in 2026-06), the bundled Chromium
      # only changes when the Playwright dependency is bumped on purpose.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Quality gate
        run: pnpm quality:all
