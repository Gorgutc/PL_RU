name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ship:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # pnpm version is taken from package.json "packageManager". Do not also
      # set `version:` here; pnpm/action-setup errors on double specification.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Quality gate
        run: pnpm quality:all
