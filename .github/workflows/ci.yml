name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/google-chrome

jobs:
  ship:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # pnpm version is taken from package.json "packageManager". Do not also
      # set `version:` here; pnpm/action-setup errors on double specification.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Verify CI Chrome
        shell: bash
        run: |
          test -x "$PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH"
          "$PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH" --version

      - name: Quality gate
        run: pnpm quality:all
