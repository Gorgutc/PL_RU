pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,tsx,js,mjs,cjs,json,md,scss,yml,yaml}'
      run: corepack pnpm exec prettier --check {staged_files}
    eslint:
      glob: '*.{ts,tsx,js,mjs,cjs}'
      run: corepack pnpm exec eslint {staged_files}
    stylelint:
      glob: '*.scss'
      run: corepack pnpm exec stylelint {staged_files}

pre-push:
  commands:
    quality-fast:
      run: corepack pnpm run quality:fast
