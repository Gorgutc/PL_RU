<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card" style="background:#f6f7f9;padding:24px">
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
    <div style="background:#fff;border-radius:4px;padding:16px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 1px 3px 0 rgba(0,0,0,.1)">
      <div style="font-size:14px;font-weight:600;color:#1c2127">Customer Ontology</div>
      <div style="font-size:12px;color:#5f6b7c;margin-top:4px">12,481 objects · v3.2</div>
      <div style="margin-top:12px;display:flex;gap:6px">
        <span style="font-size:11px;background:rgba(45,114,210,.15);color:#215db0;padding:2px 6px;border-radius:4px;font-weight:500">production</span>
        <span style="font-size:11px;background:rgba(95,107,124,.15);color:#5f6b7c;padding:2px 6px;border-radius:4px;font-weight:500">v3.2</span>
      </div>
    </div>
    <div style="background:#fff;border-radius:4px;padding:16px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 4px 6px -4px rgba(0,0,0,.1),0 10px 15px -3px rgba(0,0,0,.1)">
      <div style="font-size:14px;font-weight:600;color:#1c2127">Pipeline · hover</div>
      <div style="font-size:12px;color:#5f6b7c;margin-top:4px">Interactive lift to elev-2</div>
      <div class="row" style="margin-top:12px;gap:6px">
        <img src="../assets/icons/16px/path.svg" style="width:14px;height:14px"><span class="label-mono" style="color:#5f6b7c">14 nodes</span>
      </div>
    </div>
    <div style="background:#1c2127;border-radius:4px;padding:16px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 1px 10px 0 rgba(0,0,0,.2)">
      <div style="font-size:14px;font-weight:600;color:#f6f7f9">Dark variant</div>
      <div style="font-size:12px;color:#abb3bf;margin-top:4px">Inset highlight rim</div>
      <div class="row" style="margin-top:12px;gap:6px">
        <img src="../assets/icons/16px/database.svg" style="width:14px;height:14px;filter:invert(1);opacity:.7"><span class="label-mono" style="color:#abb3bf">prod_db</span>
      </div>
    </div>
  </div>
</div></body></html>
