<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card" style="background:#f6f7f9">
  <div class="col-label" style="margin-bottom:8px">Menu · used inside Popover / dropdown</div>
  <div style="display:flex;gap:24px">
    <div style="background:#fff;border-radius:4px;width:220px;box-shadow:0 0 0 1px rgba(17,20,24,.1),0 4px 6px -4px rgba(0,0,0,.1),0 10px 15px -3px rgba(0,0,0,.1);padding:5px 0;font-size:14px;color:#1c2127">
      <div style="padding:6px 12px;font-size:11px;color:#8f99a8;letter-spacing:.06em;text-transform:uppercase;font-weight:600">Actions</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer"><img src="../assets/icons/16px/edit.svg" style="width:16px;height:16px"> Edit pipeline</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(45,114,210,.15);color:#215db0"><img src="../assets/icons/16px/duplicate.svg" style="width:16px;height:16px"> Duplicate</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer"><img src="../assets/icons/16px/share.svg" style="width:16px;height:16px"> Share</div>
      <div style="height:1px;background:rgba(17,20,24,.1);margin:5px 0"></div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;color:#ac2f33"><img src="../assets/icons/16px/trash.svg" style="width:16px;height:16px;filter:invert(20%) sepia(63%) saturate(2160%) hue-rotate(335deg) brightness(91%) contrast(86%)"> Delete</div>
    </div>
    <div style="background:#1c2127;border-radius:4px;width:220px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 4px 6px -4px rgba(0,0,0,.5),0 10px 30px -5px rgba(0,0,0,.5);padding:5px 0;font-size:14px;color:#f6f7f9">
      <div style="padding:6px 12px;font-size:11px;color:#8f99a8;letter-spacing:.06em;text-transform:uppercase;font-weight:600">Filter by</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer"><img src="../assets/icons/16px/database.svg" style="width:16px;height:16px;filter:invert(1);opacity:.7"> Source</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:rgba(76,144,240,.2);color:#8abbff"><img src="../assets/icons/16px/calendar.svg" style="width:16px;height:16px;filter:invert(70%) sepia(33%) saturate(700%) hue-rotate(190deg)"> Date range</div>
      <div style="padding:6px 12px;display:flex;align-items:center;gap:8px;cursor:pointer"><img src="../assets/icons/16px/user.svg" style="width:16px;height:16px;filter:invert(1);opacity:.7"> Owner</div>
    </div>
  </div>
</div></body></html>
