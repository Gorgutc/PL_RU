<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card">
  <div class="col-label" style="margin-bottom:8px">Input · select · numeric</div>
  <div class="row" style="gap:8px;align-items:center">
    <label style="font-size:12px;color:#5f6b7c;display:flex;flex-direction:column;gap:3px">
      <span>Name</span>
      <input value="pipeline_alpha" style="font-family:var(--bp-font-sans);font-size:14px;height:30px;width:160px;padding:0 10px;background:#fff;border:none;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 1px 1px rgba(17,20,24,.1);color:#1c2127">
    </label>
    <label style="font-size:12px;color:#5f6b7c;display:flex;flex-direction:column;gap:3px">
      <span>Source</span>
      <div style="position:relative">
        <select style="font-family:var(--bp-font-sans);font-size:14px;height:30px;padding:0 28px 0 10px;background:linear-gradient(to bottom,#fff,#f6f7f9);border:none;border-radius:4px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1);color:#1c2127;appearance:none">
          <option>Foundry</option><option>S3</option>
        </select>
        <img src="../assets/icons/16px/chevron-down.svg" style="width:14px;height:14px;position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none">
      </div>
    </label>
    <label style="font-size:12px;color:#5f6b7c;display:flex;flex-direction:column;gap:3px">
      <span>Concurrency</span>
      <div style="display:flex">
        <input value="12" style="font-family:var(--bp-font-mono);font-size:14px;height:30px;width:60px;padding:0 10px;background:#fff;border:none;border-radius:4px 0 0 4px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 1px 1px rgba(17,20,24,.1);color:#1c2127">
        <div style="display:flex;flex-direction:column">
          <button style="height:15px;width:20px;background:linear-gradient(to bottom,#fff,#f6f7f9);border:none;border-radius:0 4px 0 0;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2);cursor:pointer"><img src="../assets/icons/16px/chevron-up.svg" style="width:10px;height:10px;display:block;margin:0 auto"></button>
          <button style="height:15px;width:20px;background:linear-gradient(to bottom,#fff,#f6f7f9);border:none;border-radius:0 0 4px 0;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2);cursor:pointer"><img src="../assets/icons/16px/chevron-down.svg" style="width:10px;height:10px;display:block;margin:0 auto"></button>
        </div>
      </div>
    </label>
  </div>
  <div class="col-label" style="margin-top:14px;margin-bottom:8px">Checkbox · radio · switch</div>
  <div class="row" style="gap:16px;align-items:center">
    <label style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#1c2127;cursor:pointer">
      <span style="width:16px;height:16px;background:#2d72d2;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px">✓</span>
      Run on commit
    </label>
    <label style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#1c2127;cursor:pointer">
      <span style="width:16px;height:16px;background:#fff;border-radius:3px;box-shadow:inset 0 0 0 1px rgba(17,20,24,.3)"></span>
      Notify on failure
    </label>
    <label style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#1c2127;cursor:pointer">
      <span style="width:16px;height:16px;background:#2d72d2;border-radius:50%;box-shadow:inset 0 0 0 4px #fff,inset 0 0 0 5px #2d72d2"></span>
      Production
    </label>
    <label style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#1c2127;cursor:pointer">
      <span style="width:28px;height:16px;background:#2d72d2;border-radius:8px;position:relative">
        <span style="position:absolute;left:14px;top:2px;width:12px;height:12px;background:#fff;border-radius:50%"></span>
      </span>
      Dark theme
    </label>
  </div>
</div></body></html>
