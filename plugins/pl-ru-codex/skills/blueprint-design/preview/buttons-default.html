<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head><body class="bp6"><div class="card">
  <div class="col-label" style="margin-bottom:8px">Default button · 3 sizes</div>
  <div class="row" style="gap:8px;align-items:center">
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;height:24px;padding:0 10px;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1);font-size:12px">Small</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1)">Default</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;height:40px;padding:0 16px;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1);font-size:16px">Large</button>
  </div>
  <div class="col-label" style="margin-top:14px;margin-bottom:8px">Variants</div>
  <div class="row" style="gap:8px;align-items:center">
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1)">Default</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:transparent;color:#1c2127">Minimal</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:transparent;color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2)">Outlined</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1);opacity:.5;cursor:not-allowed">Disabled</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1);box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1),0 0 0 2px rgba(33,93,176,.752)">Focus</button>
  </div>
  <div class="col-label" style="margin-top:14px;margin-bottom:8px">With icons (16px)</div>
  <div class="row" style="gap:8px">
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1)"><img src="../assets/icons/16px/add.svg" style="width:16px;height:16px;filter:invert(15%) sepia(8%) saturate(900%) hue-rotate(190deg)"> Add row</button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1)"><img src="../assets/icons/16px/refresh.svg" style="width:16px;height:16px"></button>
    <button style="display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--bp-font-sans);font-size:14px;line-height:1;font-weight:400;height:30px;min-width:30px;padding:0 12px;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;letter-spacing:0;background:linear-gradient(to bottom,#fff,#f6f7f9);color:#1c2127;box-shadow:inset 0 0 0 1px rgba(17,20,24,.2),inset 0 -1px 0 rgba(17,20,24,.1)">Filter <img src="../assets/icons/16px/chevron-down.svg" style="width:16px;height:16px"></button>
  </div>
</div></body></html>
