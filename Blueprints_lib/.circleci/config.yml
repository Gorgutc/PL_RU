version: 2.1

parameters:
  run-chromatic:
    type: boolean
    default: false

orbs:
  browser-tools: circleci/browser-tools@2.4.0

aliases:
  - &docker-node-image
    - image: cimg/node:24.14.1

  - &docker-node-browsers-image
    - image: cimg/node:24.14.1-browsers
      environment:
        CHROME_BIN: "/usr/bin/google-chrome"

  - &restore-pnpm-cache
    name: Restore pnpm store cache
    key: v1-pnpm-store-{{ checksum "pnpm-lock.yaml" }}

  - &save-pnpm-cache
    name: Save pnpm store cache
    paths:
      - ~/.local/share/pnpm/store
    key: v1-pnpm-store-{{ checksum "pnpm-lock.yaml" }}

jobs:
  circle-all:
    resource_class: small
    docker: *docker-node-image
    steps:
      - checkout
      - run:
          name: Validate policy file
          command: |
            rcode=$(curl "https://policy-bot.general.dmz.palantir.tech/api/validate" -XPUT -T ".policy.yml" -s -w "%{http_code}" -o /tmp/response)
            if [[ "${rcode}" -gt 299 ]]; then
              jq -r .message < /tmp/response && exit 1
            fi

  checkout-code:
    docker: *docker-node-image
    steps:
      - checkout
      - restore_cache: *restore-pnpm-cache
      - run: sudo corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm store prune
      - save_cache: *save-pnpm-cache
      - persist_to_workspace:
          root: "."
          paths:
            - node_modules
            - packages/*/node_modules

  clean-lockfile:
    docker: *docker-node-image
    steps:
      - checkout
      - restore_cache: *restore-pnpm-cache
      - run: sudo corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm dedupe --check

  compile:
    docker: *docker-node-image
    resource_class: xlarge
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: pnpm compile --parallel=7
      - persist_to_workspace:
          root: "."
          paths:
            - packages/*/lib
            - packages/*/src/generated

  format-check:
    docker: *docker-node-image
    environment:
      JUNIT_REPORT_PATH: reports
      NODE_ENV: test
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: pnpm format-check

  lint:
    docker: *docker-node-image
    resource_class: large
    environment:
      JUNIT_REPORT_PATH: reports
      NODE_ENV: test
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: mkdir -p ./reports/eslint ./reports/stylelint
      # types and lint rules should already be compiled since this job depends on the 'compile' job
      - run:
          command: pnpm lint
          no_output_timeout: 20m
      - store_test_results: { path: ./reports }
      - store_artifacts: { path: ./reports }

  dist:
    docker: *docker-node-image
    resource_class: xlarge
    environment:
      NODE_ENV: test
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: pnpm dist --parallel=7
      - persist_to_workspace:
          root: "."
          paths: [packages/*/lib, packages/*/dist]
      - run: pnpm build-storybook
      - persist_to_workspace:
          root: "."
          paths: [storybook-static]

  test-node-libs:
    docker: *docker-node-image
    environment:
      JUNIT_REPORT_PATH: reports
    parallelism: 2
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: mkdir -p ./reports
      - run:
          command: |
            case $CIRCLE_NODE_INDEX in \
            0) pnpm nx test @blueprintjs/eslint-plugin ;; \
            1) pnpm nx test @blueprintjs/stylelint-plugin ;; \
            esac
          when: always
      - store_test_results: { path: ./reports }
      - store_artifacts: { path: ./reports }

  test-react-18: &test-react
    docker: *docker-node-browsers-image
    resource_class: xlarge
    environment:
      JUNIT_REPORT_PATH: reports
    parallelism: 6
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - browser-tools/install_chrome
      - browser-tools/install_chromedriver
      - run:
          name: Verify Chrome browser installed
          command: |
            google-chrome --version
            chromedriver --version
      - run: mkdir -p ./reports
      - run:
          # split vitest tests into containers because they can take up a lot of memory
          # Orginally did this while tests were still running on Karma because running
          # them in one container caused Karma to time out frequently
          # see https://github.com/palantir/blueprint/issues/3616
          command: |
            case $CIRCLE_NODE_INDEX in \
            0) pnpm nx run-many -t test:typeCheck ;; \
            1) pnpm nx test:vitest:run @blueprintjs/core ;; \
            2) pnpm nx test:vitest:run @blueprintjs/datetime ;; \
            4) pnpm nx test:vitest:run @blueprintjs/select ;; \
            5) pnpm nx test:vitest:run @blueprintjs/table
            esac
          when: always
      - store_test_results: { path: ./reports }
      - store_artifacts: { path: ./reports }

  test-iso-react-18: &test-iso
    docker: *docker-node-image
    environment:
      JUNIT_REPORT_PATH: reports
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: mkdir ./reports
      - run: pnpm nx run-many -t test:iso
      - store_test_results: { path: ./reports }
      - store_artifacts: { path: ./reports }

  chromatic:
    docker: *docker-node-image
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run:
          # Checks for the project token for Chromatic, which is not available to forked repos
          name: Check chromatic project token available
          command: |
            if [ -z "$CHROMATIC_PROJECT_TOKEN" ]; then
              echo "Skipping Chromatic (no project token — likely a fork build)"
              exit 0
            fi
            pnpm exec chromatic --storybook-build-dir storybook-static --exit-zero-on-changes --only-changed --trace-changed

  deploy-preview:
    docker: *docker-node-image
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - store_artifacts: { path: packages/docs-app/dist }
      - store_artifacts: { path: packages/landing-app/dist }
      - store_artifacts: { path: packages/table-dev-app/dist }
      - store_artifacts: { path: packages/demo-app/dist }
      - store_artifacts: { path: storybook-static }
      - run: ./scripts/submit-preview-comment.sh

  store-packages:
    docker: *docker-node-image
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run: mkdir ./artifacts
      - run: ./scripts/pack-npm
      - store_artifacts: { path: ./artifacts }

  deploy-npm:
    docker: *docker-node-image
    steps:
      - checkout
      - attach_workspace: { at: "." }
      - run: sudo corepack enable
      - run:
          command: |
            # From https://docs.npmjs.com/trusted-publishers#circleci-configuration
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            ./scripts/publish-npm-semver-tagged

workflows:
  compile_lint_test_dist_deploy:
    unless: << pipeline.parameters.run-chromatic >>
    jobs:
      - circle-all:
          requires: [dist, lint, test-node-libs, test-react-18, test-iso-react-18]
      - checkout-code
      - clean-lockfile:
          requires: [checkout-code]
      - compile:
          requires: [checkout-code]
      - format-check:
          requires: [checkout-code]
      - lint:
          requires: [compile]
      - dist:
          requires: [compile]
      - test-node-libs:
          requires: [compile]
      - test-react-18:
          requires: [compile]
      - test-iso-react-18:
          requires: [compile]
      - chromatic:
          requires: [dist]
          filters:
            branches:
              only: develop
      - deploy-preview:
          requires: [dist]
      - store-packages:
          requires: [dist]
      - deploy-npm:
          requires: [dist, lint, test-node-libs, test-react-18, test-iso-react-18]
          filters:
            branches:
              only:
                - develop
                - next
                - /^release\/.*/
  chromatic-on-demand:
    when: << pipeline.parameters.run-chromatic >>
    jobs:
      - checkout-code
      - compile:
          requires: [checkout-code]
      - dist:
          requires: [compile]
      - chromatic:
          requires: [dist]
